<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All research and evidence</title>
  <style>
    :root {
      --text: #111111;
      --muted: #5f5f5f;
      --line: #dadada;
      --blue: #1779c6;
      --bg: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      width: min(980px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(40px, 6vw, 62px);
      line-height: 0.95;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: 320px repeat(3, minmax(160px, 1fr));
      gap: 18px 22px;
      align-items: end;
      margin-bottom: 40px;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control label {
      font-size: 14px;
      color: var(--muted);
    }

    .search-wrap,
    .select-wrap {
      position: relative;
    }

    input[type="search"],
    select {
      width: 100%;
      height: 50px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      padding: 0 48px 0 16px;
      font-size: 16px;
      color: var(--text);
      appearance: none;
      outline: none;
    }

    input[type="search"]::placeholder { color: #666; }

    .search-icon,
    .select-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--blue);
      font-size: 20px;
    }

    .results-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .list {
      border-top: 1px solid transparent;
    }

    .item {
      padding: 26px 0 30px;
      border-bottom: 1px solid transparent;
    }

    .type {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .title {
      display: inline-block;
      font-size: clamp(24px, 3.1vw, 28px);
      line-height: 1.22;
      font-weight: 700;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 10px;
    }

    .title:hover {
      color: var(--blue);
    }

    .date {
      font-size: 16px;
      color: #444;
      margin-bottom: 8px;
    }

    .authors,
    .expertise,
    .summary {
      max-width: 860px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .expertise strong,
    .authors strong {
      color: var(--text);
      font-weight: 600;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .page-button {
      min-width: 34px;
      height: 34px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--blue);
      font-size: 16px;
      cursor: pointer;
    }

    .page-button.active {
      border-color: var(--line);
      color: var(--text);
    }

    .page-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .empty {
      padding: 40px 0;
      color: var(--muted);
      font-size: 18px;
    }

    .helper-note {
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    @media (max-width: 860px) {
      .controls {
        grid-template-columns: 1fr;
      }

      h1 {
        margin-bottom: 22px;
      }

      .item {
        padding: 20px 0 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>All research and evidence</h1>

    <section class="controls" aria-label="Search and filters">
      <div class="control">
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="Search" aria-label="Search resources" />
          <span class="search-icon">⌕</span>
        </div>
      </div>

      <div class="control">
        <div class="select-wrap">
          <select id="typeFilter" aria-label="Filter by type">
            <option value="">Filter by type</option>
          </select>
          <span class="select-icon">▼</span>
        </div>
      </div>

      <div class="control">
        <div class="select-wrap">
          <select id="expertiseFilter" aria-label="Filter by expertise">
            <option value="">Filter by expertise</option>
          </select>
          <span class="select-icon">▼</span>
        </div>
      </div>

      <div class="control">
        <div class="select-wrap">
          <select id="authorFilter" aria-label="Authors">
            <option value="">Authors</option>
          </select>
          <span class="select-icon">▼</span>
        </div>
      </div>
    </section>

    <div class="results-meta">
      <div id="resultsCount">0 results</div>
      <div id="pageInfo"></div>
    </div>

    <section id="list" class="list" aria-live="polite"></section>
    <nav id="pagination" class="pagination" aria-label="Pagination"></nav>

    <p class="helper-note">
      Starter prototype for GitHub Pages. Replace the sample <code>resources</code> array in the script with more entries from your spreadsheet, or convert the spreadsheet to JSON later for a cleaner workflow.
    </p>
  </main>

  <script>
    const resources = [
      {
        title: "Immigrants in the Low-Wage Workforce",
        url: "https://www.workrisenetwork.org/working-knowledge/immigrants-low-wage-workforce",
        type: "Research Report",
        date: "2025",
        authors: "WorkRise (Urban Institute); Hamutal Bernstein; Fernando Hernandez-Lepe",
        expertise: ["Economic Activity or Impact", "Low-Wage Workforce", "Industry-Specific"],
        summary: "National data tool on immigrant low-wage workers shows they are overrepresented in key sectors and includes demographic analysis, charts, and policy recommendations.",
      },
      {
        title: "Building Inclusive Cities: Immigration and Neighborhood Change in Detroit",
        url: "https://globaldetroitmi.org/wp-content/uploads/2021/08/20210803-BIC-Report_Compressed.pdf",
        type: "Research Report",
        date: "2021",
        authors: "Global Detroit; Alan Mallach; Data Driven Detroit",
        expertise: ["Economic Activity or Impact", "Small Business", "Notable Contributions / Success Stories"],
        summary: "Detroit-focused report showing how immigrants help stabilize neighborhoods through homeownership and small business development.",
      },
      {
        title: "Toolkit: Mobilizing Against Anti-Refugee/Asylum Legislation in States",
        url: "https://www.refugeeadvocacylab.org/resources/toolkit-mobilizing-against-anti-refugee/asylum-legislation",
        type: "Policy Guide",
        date: "2024",
        authors: "Refugee Advocacy Lab; IRAP; IRC; American Immigration Council",
        expertise: ["Policy Advocacy", "Refugees", "Asylum / Humanitarian Entrants"],
        summary: "Advocacy toolkit to combat anti-refugee and anti-asylum state legislation, with mobilization, testimony, and messaging guidance.",
      },
      {
        title: "The Red State Playbook: Opportunities for Refugee and Immigrant Inclusion and Workforce Engagement",
        url: "https://www.refugeeadvocacylab.org/resources/the-red-state-playbook",
        type: "Policy Guide",
        date: "2025",
        authors: "Refugee Advocacy Lab; IRAP; Balqees Mihirig; Charlotte Haq",
        expertise: ["Economic Activity or Impact", "High Skilled Labor", "Workforce Engagement"],
        summary: "Guide highlighting bipartisan and Republican-supported state actions that advance refugee and immigrant inclusion through economic and workforce strategies.",
      },
      {
        title: "Welcoming Economy Tracker",
        url: "https://www.example.com/welcoming-economy-tracker",
        type: "Fact Sheet",
        date: "2023",
        authors: "Example Research Institute",
        expertise: ["Quick Facts", "Population Growth", "Business Engagement"],
        summary: "Example placeholder entry showing how additional resources from the spreadsheet can be added to the list view.",
      },
      {
        title: "State Strategies for International Student Retention",
        url: "https://www.example.com/state-strategies-international-students",
        type: "Program Guide",
        date: "2022",
        authors: "Example University Center",
        expertise: ["International Students", "Program Design / Best Practices", "State-Level"],
        summary: "Example placeholder entry showing another content type and filter combination.",
      }
    ];

    const state = {
      search: "",
      type: "",
      expertise: "",
      author: "",
      page: 1,
      perPage: 8,
    };

    const searchInput = document.getElementById("searchInput");
    const typeFilter = document.getElementById("typeFilter");
    const expertiseFilter = document.getElementById("expertiseFilter");
    const authorFilter = document.getElementById("authorFilter");
    const list = document.getElementById("list");
    const pagination = document.getElementById("pagination");
    const resultsCount = document.getElementById("resultsCount");
    const pageInfo = document.getElementById("pageInfo");

    function uniqueValues(values) {
      return [...new Set(values)].filter(Boolean).sort((a, b) => a.localeCompare(b));
    }

    function fillSelect(select, values, defaultLabel) {
      select.innerHTML = `<option value="">${defaultLabel}</option>`;
      values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    fillSelect(typeFilter, uniqueValues(resources.map(item => item.type)), "Filter by type");
    fillSelect(expertiseFilter, uniqueValues(resources.flatMap(item => item.expertise)), "Filter by expertise");
    fillSelect(authorFilter, uniqueValues(resources.map(item => item.authors)), "Authors");

    function filterResources() {
      return resources.filter(item => {
        const haystack = [
          item.title,
          item.authors,
          item.summary,
          item.type,
          item.date,
          ...item.expertise,
        ].join(" ").toLowerCase();

        const matchesSearch = !state.search || haystack.includes(state.search.toLowerCase());
        const matchesType = !state.type || item.type === state.type;
        const matchesExpertise = !state.expertise || item.expertise.includes(state.expertise);
        const matchesAuthor = !state.author || item.authors === state.author;

        return matchesSearch && matchesType && matchesExpertise && matchesAuthor;
      });
    }

    function renderList() {
      const filtered = filterResources();
      const totalPages = Math.max(1, Math.ceil(filtered.length / state.perPage));
      if (state.page > totalPages) state.page = totalPages;

      const start = (state.page - 1) * state.perPage;
      const visible = filtered.slice(start, start + state.perPage);

      resultsCount.textContent = `${filtered.length} result${filtered.length === 1 ? "" : "s"}`;
      pageInfo.textContent = filtered.length ? `Page ${state.page} of ${totalPages}` : "";

      if (!visible.length) {
        list.innerHTML = `<div class="empty">No resources match the current search and filter combination.</div>`;
      } else {
        list.innerHTML = visible.map(item => `
          <article class="item">
            <div class="type">${item.type}</div>
            <a class="title" href="${item.url}" target="_blank" rel="noopener noreferrer">${item.title}</a>
            <div class="date">${item.date}</div>
            <div class="authors"><strong>Authors:</strong> ${item.authors}</div>
            <div class="expertise"><strong>Expertise:</strong> ${item.expertise.join(", ")}</div>
            <div class="summary">${item.summary}</div>
          </article>
        `).join("");
      }

      renderPagination(totalPages, filtered.length);
    }

    function renderPagination(totalPages, totalResults) {
      if (!totalResults) {
        pagination.innerHTML = "";
        return;
      }

      let pages = [];
      if (totalPages <= 7) {
        pages = Array.from({ length: totalPages }, (_, i) => i + 1);
      } else {
        pages = [1, 2, 3, "…", totalPages, "next"];
      }

      pagination.innerHTML = `
        <button class="page-button" ${state.page === 1 ? "disabled" : ""} data-action="prev">‹</button>
        ${pages.map(page => {
          if (page === "…") return `<span class="page-button" style="cursor:default;color:var(--muted);">…</span>`;
          if (page === "next") return "";
          return `<button class="page-button ${page === state.page ? "active" : ""}" data-page="${page}">${page}</button>`;
        }).join("")}
        <button class="page-button" ${state.page === totalPages ? "disabled" : ""} data-action="next">›</button>
      `;

      pagination.querySelectorAll("[data-page]").forEach(button => {
        button.addEventListener("click", () => {
          state.page = Number(button.dataset.page);
          renderList();
        });
      });

      pagination.querySelectorAll("[data-action]").forEach(button => {
        button.addEventListener("click", () => {
          if (button.dataset.action === "prev" && state.page > 1) state.page -= 1;
          if (button.dataset.action === "next") state.page += 1;
          renderList();
        });
      });
    }

    searchInput.addEventListener("input", e => {
      state.search = e.target.value.trim();
      state.page = 1;
      renderList();
    });

    typeFilter.addEventListener("change", e => {
      state.type = e.target.value;
      state.page = 1;
      renderList();
    });

    expertiseFilter.addEventListener("change", e => {
      state.expertise = e.target.value;
      state.page = 1;
      renderList();
    });

    authorFilter.addEventListener("change", e => {
      state.author = e.target.value;
      state.page = 1;
      renderList();
    });

    renderList();
  </script>
</body>
</html>
